name: EUserv Daily Renew

on:
  schedule:
    - cron: '0 12 * * *' # 北京时间晚上8点（UTC 北京时区+8）
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EUserv renew script
        env:
          # 账号 1（必填）
          EUSERV_EMAIL: ${{ secrets.EUSERV_EMAIL }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          # 账号 2~5（可选，不配置则自动跳过）
          EUSERV_EMAIL2: ${{ secrets.EUSERV_EMAIL2 }}
          EUSERV_PASSWORD2: ${{ secrets.EUSERV_PASSWORD2 }}
          EMAIL_PASS2: ${{ secrets.EMAIL_PASS2 }}
          EUSERV_EMAIL3: ${{ secrets.EUSERV_EMAIL3 }}
          EUSERV_PASSWORD3: ${{ secrets.EUSERV_PASSWORD3 }}
          EMAIL_PASS3: ${{ secrets.EMAIL_PASS3 }}
          EUSERV_EMAIL4: ${{ secrets.EUSERV_EMAIL4 }}
          EUSERV_PASSWORD4: ${{ secrets.EUSERV_PASSWORD4 }}
          EMAIL_PASS4: ${{ secrets.EMAIL_PASS4 }}
          EUSERV_EMAIL5: ${{ secrets.EUSERV_EMAIL5 }}
          EUSERV_PASSWORD5: ${{ secrets.EUSERV_PASSWORD5 }}
          EMAIL_PASS5: ${{ secrets.EMAIL_PASS5 }}
          # 通知（可选）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python euser_renew.py

# --- action保活 ---
      - name: Keep Alive Action
        run: |
          date > last_run.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git commit -m "Keep alive: $(date)" || echo "No changes to commit"
          git push